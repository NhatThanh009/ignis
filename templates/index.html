<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IgnisGo | Professional Go Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-primary: #ff4d00;
            --accent-secondary: #d42426;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background: radial-gradient(circle at 50% -20%, #ff4d0015 0%, #0a0a0a 60%);
        }

        /* Animated background glow */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, #ff4c0005, transparent);
            pointer-events: none;
            z-index: -1;
        }

        header {
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 10, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            transition: transform 0.3s ease;
        }

        .hero-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 77, 0, 0.3);
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p.description {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-ignis {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(255, 77, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-ignis:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(255, 77, 0, 0.4);
            filter: brightness(1.1);
        }

        .btn-ignis:active {
            transform: scale(0.98);
        }

        #result {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-primary);
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .htmx-adding #result {
            opacity: 0;
            transform: translateY(10px);
        }

        .htmx-settling #result {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            padding: 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
        }

        #clock {
            position: absolute;
            right: 2rem;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--accent-primary);
            background: var(--glass-bg);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(255, 77, 0, 0.3);
        }

        .glow {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--accent-primary);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
            bottom: 10%;
            right: 10%;
        }

        @media (max-width: 640px) {
            h2 {
                font-size: 1.8rem;
            }

            .hero-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <header>
        <h1>IgnisGo</h1>
        <div id="clock">00:00:00</div>
    </header>
    <main>
        <div class="hero-card">
            <h2>Experience the Heat</h2>
            <p class="description">
                Fast, reliable, and professional Go services powered by HTMX. Built for performance and modern web
                standards.
            </p>
            <button class="btn-ignis" hx-get="/hello" hx-target="#result" hx-swap="innerHTML transition:true">
                Ignite Now
            </button>
            <div id="result"></div>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="copyright-year"></span> IgnisGo Project. Blazing the path in backend development.</p>
    </footer>
    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('clock').textContent = time;
            document.getElementById('copyright-year').textContent = now.getFullYear();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>

</html>
